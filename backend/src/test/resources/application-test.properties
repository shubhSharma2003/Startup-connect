spring.datasource.url=jdbc:h2:mem:startup_connect_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.flyway.enabled=false

logging.file.name=target/test-logs/startup-connect-test.log

app.jwt.secret=test-development-secret-key-that-is-long-enough-for-hmac-sha256
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000
app.security.email-verification-expiration-ms=86400000
app.security.password-reset-expiration-ms=900000
app.frontend-base-url=http://localhost:3000

aws.access-key=test-access-key
aws.secret-key=test-secret-key
aws.bucket-name=startup-connect-test
aws.region=ap-south-1
app.upload.profile-image-max-size-bytes=5242880
app.upload.resume-max-size-bytes=10485760
