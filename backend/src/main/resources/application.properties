spring.application.name=startup-connect
server.port=8080

server.error.include-message=never
server.error.include-binding-errors=never
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/startup_connect?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

app.jwt.secret=${JWT_SECRET:local-development-secret-key-that-is-long-enough-for-hmac-sha256}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
app.security.email-verification-expiration-ms=${EMAIL_VERIFICATION_EXPIRATION_MS:86400000}
app.security.password-reset-expiration-ms=${PASSWORD_RESET_EXPIRATION_MS:900000}
app.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:3000}

aws.access-key=${AWS_ACCESS_KEY:local-access-key}
aws.secret-key=${AWS_SECRET_KEY:local-secret-key}
aws.bucket-name=${AWS_BUCKET_NAME:startup-connect-local}
aws.region=${AWS_REGION:ap-south-1}

app.upload.profile-image-max-size-bytes=${PROFILE_IMAGE_MAX_SIZE_BYTES:5242880}
app.upload.resume-max-size-bytes=${RESUME_MAX_SIZE_BYTES:10485760}

logging.level.root=INFO
logging.level.com.startupconnect=DEBUG
logging.file.name=logs/startup-connect.log


