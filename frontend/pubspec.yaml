name: startupconnect_app
description: "StartupConnect - Student Collaboration & Team Formation Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Navigation
  go_router: ^14.0.0
  
  # Networking
  dio: ^5.4.3
  
  # Models & JSON
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  
  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  
  # UI & Assets
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0
  lottie: ^3.1.2
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  file_picker: ^8.1.0
  timeago: ^3.7.1
  connectivity_plus: ^7.2.0
  flutter_dotenv: ^6.0.1
  intl: ^0.20.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.9.5
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - .env.development
    - .env.staging
    - .env.production
    - assets/images/
    - assets/svg/
    - assets/lottie/
